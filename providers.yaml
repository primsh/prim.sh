# providers.yaml — Single source of truth for external provider metadata.
# Each prim.yaml providers[].name references a key here.
# Used by: gen-tests (integration test templates), create-prim (wizard), gen-deploy-smoke.

cloudflare-r2:
  display_name: Cloudflare R2
  url: https://developers.cloudflare.com/r2/
  docs: https://developers.cloudflare.com/r2/api/s3/api/
  layer: s3
  category: storage
  auth:
    type: aws-sigv4
    env:
      access_key: R2_ACCESS_KEY_ID
      secret_key: R2_SECRET_ACCESS_KEY
      account_id: CLOUDFLARE_ACCOUNT_ID
    extra_env:
      api_token: CLOUDFLARE_API_TOKEN
  health_check:
    method: HEAD
    url: "https://{account_id}.r2.cloudflarestorage.com"
    expect: 200
  integration:
    setup: cf-api-create-bucket
    teardown: cf-api-delete-bucket
    crud: s3-object-crud

cloudflare:
  display_name: Cloudflare
  url: https://developers.cloudflare.com/api/
  docs: https://developers.cloudflare.com/api/operations/zones-get
  layer: rest
  category: dns
  auth:
    type: bearer
    env:
      api_token: CLOUDFLARE_API_TOKEN
      zone_id: CLOUDFLARE_ZONE_ID
  base_url: https://api.cloudflare.com/client/v4
  health_check:
    method: GET
    url: "https://api.cloudflare.com/client/v4/zones/{zone_id}"
    expect: 200
  integration:
    crud: rest-list

namesilo:
  display_name: NameSilo
  url: https://www.namesilo.com/
  docs: https://www.namesilo.com/api-reference
  layer: rest
  category: domains
  auth:
    type: api-key
    env:
      api_key: NAMESILO_API_KEY
  base_url: https://www.namesilo.com/api
  health_check:
    method: GET
    url: "https://www.namesilo.com/api/listDomains?version=1&type=xml&key={api_key}"
    expect: 200
  integration:
    crud: rest-health

tavily:
  display_name: Tavily
  url: https://tavily.com/
  docs: https://docs.tavily.com/documentation/api-reference/search
  layer: rest
  category: search
  auth:
    type: api-key
    env:
      api_key: TAVILY_API_KEY
  base_url: https://api.tavily.com
  health_check:
    method: POST
    url: https://api.tavily.com/search
    body: '{"api_key": "{api_key}", "query": "test", "max_results": 1}'
    expect: 200
  integration:
    crud: rest-search

