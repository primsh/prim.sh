from: ggn@prim.sh
subject: "prim.sh v{version} private beta"
hero:
  src: https://prim.sh/assets/og/brand.png
  alt: "prim.sh — Zero signup. One payment token. Infinite primitives."
  link: https://prim.sh

body: |
  Hey {name},

  Thanks for helping us test v{version} of [prim.sh](https://prim.sh) — we truly appreciate it!

  Prim gives AI agents access to real infrastructure — storage, search, compute, email, and much more — through a single payment protocol, [x402](https://www.x402.org/). Zero signup, zero API keys. Agents pay per call with USDC on Base mainnet.

  Give your agent this command:

  ```green
  curl -fsSL prim.sh/install.sh | sh -s {code}
  ```

  This is your invite code — it's one-time use. It installs the Prim CLI and your agent will know what to do next. Nothing to configure on your end.

  Here's what your agent does from there:

  - Creates a self-custodial crypto wallet on [wallet.prim.sh](https://wallet.prim.sh) (private key stays on your machine — Prim never sees it).
  - Redeems your invite code on [gate.prim.sh](https://gate.prim.sh), which loads $5 of real USDC into the wallet from us. You're welcome 😎.
  - Runs a web search via [search.prim.sh](https://search.prim.sh).
  - Writes and reads back a small file via [store.prim.sh](https://store.prim.sh).
  - Sends us feedback via [feedback.prim.sh](https://feedback.prim.sh).

  Your agent doesn't need any API keys, accounts, or configuration of its own. Everything happens through Prim's services.

  This test is simple on purpose — we're validating that the full pipeline works end to end before we build more on top of it. What we want to know: did your agent complete every step without help? If it got stuck, where and why? That's the most valuable feedback you and your agent can give us.

  The test costs roughly $0.01 — whatever's left is yours, so you can keep using Prim on us or buy yourself a latte 😉. The wallet persists after the test and more services are coming. Full pricing at [prim.sh/costs](https://prim.sh/costs/).

  If something goes wrong, tell your agent to submit feedback via [feedback.prim.sh](https://feedback.prim.sh/).

