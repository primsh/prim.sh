name: Deploy

# Triggers after CI passes on main, or manually via workflow_dispatch.
# Never runs concurrently — queues instead of cancelling an active site deploy.
#
# ── Architecture ─────────────────────────────────────────────────────────────
#
# One deploy target:
#
#   deploy-site  Marketing site (prim.sh)
#                Build static dist from site/ → wrangler pages deploy
#                Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (production environment)
#                Variable: PAGES_PROJECT (repo-level)
#
#   verify       Smoke check after the site deploy completes
#                Fetches /_build_id.txt from prim.sh and confirms SHA matches
#
# Site is served by Cloudflare Pages (project: prim-sh).
# The former VPS/API-service deployment was retired in July 2026.
#
# ── Required GitHub secrets ──────────────────────────────────────────────────
#
# Production environment (used by deploy-site):
#   CLOUDFLARE_API_TOKEN    Cloudflare API token (Pages:Edit permission)
#   CLOUDFLARE_ACCOUNT_ID   Cloudflare account ID
#
# ── Required GitHub repository variable ──────────────────────────────────────
#
#   PAGES_PROJECT   Cloudflare Pages project name (e.g. "prim-sh")
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-site:
    name: Deploy site → Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Build static dist
        run: |
          mkdir -p site-dist
          # Copy all web-deliverable files; exclude server-side .ts/.py files
          rsync -a \
            --include='*/' \
            --include='*.html' --include='*.css' --include='*.js' \
            --include='*.jpg' --include='*.jpeg' --include='*.png' \
            --include='*.ico' --include='*.svg' --include='*.webp' \
            --include='*.txt' --include='*.json' \
            --include='*.sh' --include='*.ps1' --include='install' \
            --include='_headers' --include='_redirects' \
            --exclude='*' \
            site/ site-dist/
          # Substitute brand template placeholders in index.html
          bun run site/build.ts
          # Build ID for smoke check verification
          echo "$GITHUB_SHA" > site-dist/_build_id.txt

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy site-dist --project-name ${{ vars.PAGES_PROJECT }}

  verify:
    name: Smoke check
    needs: [deploy-site]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify site build ID
        run: |
          expected="${{ github.sha }}"
          for i in $(seq 1 6); do
            actual=$(curl -sf https://prim.sh/_build_id.txt || echo "")
            if [ "$actual" = "$expected" ]; then
              echo "Build ID verified: $actual"
              exit 0
            fi
            echo "Attempt $i: got '$actual', waiting..."
            sleep 10
          done
          echo "Smoke check failed: expected $expected"
          exit 1
