name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # Monday 8am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build x402-middleware
        run: pnpm --filter @primsh/x402-middleware build

      - name: Tar workspace (excluding .git)
        run: tar --exclude='.git' -cf workspace.tar .

      - uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: workspace.tar
          retention-days: 1

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xf workspace.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Lint
        run: pnpm -r lint

  format:
    name: Format
    needs: [setup]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xf workspace.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Format check
        run: pnpm -r format

  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xf workspace.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Typecheck
        run: pnpm -r typecheck

  test:
    name: Test
    needs: [setup]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xf workspace.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Test
        run: pnpm -r test

      - name: Validate OpenAPI
        run: pnpm check:openapi

  gen-check:
    name: Gen check
    needs: [setup]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Extract workspace
        run: tar -xf workspace.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Validate generated files are up to date
        run: pnpm gen:check

  audit:
    name: Audit
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  safeguards:
    name: Safeguards
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Reject large files (>1MB)
        run: |
          large=$(find . -not -path './.git/*' -not -path './node_modules/*' -not -path './.worktrees/*' -not -path './research/*' -not -path './site/assets/*' -type f -size +1M)
          if [ -n "$large" ]; then
            echo "::error::Files over 1MB found:"
            echo "$large"
            exit 1
          fi

      - name: Reject local dev paths
        run: |
          # Catch macOS/Windows/Linux home dir paths that leak local machine info.
          # /home/prim/ is the VPS service user — intentionally allowed.
          hits=$(git grep -n -E '/Users/[a-zA-Z]|C:\\Users\\|/home/(?!prim)[a-z]' -- '*.ts' '*.js' '*.json' '*.yaml' '*.yml' '*.md' '*.html' '*.css' ':!pnpm-lock.yaml' ':!tests/runs/*' 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::Local dev paths detected (remove before committing):"
            echo "$hits"
            exit 1
          fi

  commit-lint:
    name: Commit lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          for sha in $(git rev-list "$base"..HEAD); do
            msg=$(git log --format=%s -1 "$sha")
            # Skip merge and revert commits
            echo "$msg" | grep -qE '^(Merge|Revert) ' && continue
            if ! echo "$msg" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci|perf|build|style)(\([a-z0-9-]+\))?: .{1,72}$'; then
              echo "::warning::Non-conventional commit: $msg ($sha)"
            fi
          done

  security-alerts:
    name: Security alerts
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'

    steps:
      - name: Check for open vulnerability alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Security Alert Summary" >> $GITHUB_STEP_SUMMARY

          # Code scanning alerts
          code_alerts=$(gh api repos/${{ github.repository }}/code-scanning/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo "0")
          echo "Code scanning: $code_alerts open" >> $GITHUB_STEP_SUMMARY

          # Dependabot alerts
          dependabot_alerts=$(gh api repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo "0")
          echo "Dependabot: $dependabot_alerts open" >> $GITHUB_STEP_SUMMARY

          # Secret scanning alerts
          secret_alerts=$(gh api repos/${{ github.repository }}/secret-scanning/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo "0")
          echo "Secret scanning: $secret_alerts open" >> $GITHUB_STEP_SUMMARY

          total=$((code_alerts + dependabot_alerts + secret_alerts))
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $total open alerts**" >> $GITHUB_STEP_SUMMARY

          if [ "$secret_alerts" -gt 0 ]; then
            echo "::error::$secret_alerts secret scanning alert(s) detected — fix immediately"
            exit 1
          fi

          if [ "$total" -gt 0 ]; then
            echo "::warning::$total open security alert(s) — review at https://github.com/${{ github.repository }}/security"
          fi

  secret-scan:
    name: Secret scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run gitleaks
        run: |
          VERSION=v8.30.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1 2>/dev/null; then
              gitleaks detect --config .gitleaks.toml --source . --log-opts="origin/${{ github.event.pull_request.base.ref }}..HEAD" --redact --verbose
            else
              echo "::warning::Could not fetch base ref, scanning HEAD~1..HEAD"
              gitleaks detect --config .gitleaks.toml --source . --log-opts="HEAD~1..HEAD" --redact --verbose
            fi
          else
            gitleaks detect --config .gitleaks.toml --source . --log-opts="HEAD~1..HEAD" --redact --verbose
          fi

  windows-install:
    name: Windows install
    if: github.event_name != 'schedule'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build x402-middleware
        run: pnpm --filter @primsh/x402-middleware build

      - name: Build Windows binary
        run: bun build packages/cli/src/cli.ts --compile --target=bun-windows-x64 --outfile dist/prim-windows-x64.exe

      - name: Create checksums
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/prim-windows-x64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  prim-windows-x64.exe" | Out-File -Encoding utf8NoBOM dist/checksums.sha256

      - name: Start local download server
        shell: pwsh
        run: |
          $script = @'
          $listener = New-Object System.Net.HttpListener
          $listener.Prefixes.Add("http://localhost:9877/")
          $listener.Start()
          while ($listener.IsListening) {
            $ctx = $listener.GetContext()
            $filename = $ctx.Request.Url.Segments[-1]
            $filePath = Join-Path "$env:GITHUB_WORKSPACE\dist" $filename
            if (Test-Path $filePath) {
              $bytes = [System.IO.File]::ReadAllBytes($filePath)
              $ctx.Response.ContentLength64 = $bytes.Length
              $ctx.Response.OutputStream.Write($bytes, 0, $bytes.Length)
            } else {
              $ctx.Response.StatusCode = 404
            }
            $ctx.Response.Close()
          }
          '@
          $script | Out-File -Encoding utf8NoBOM serve.ps1
          Start-Process pwsh -ArgumentList "-File", "serve.ps1" -WindowStyle Hidden
          Start-Sleep -Seconds 2

      - name: Test install (no invite code)
        shell: pwsh
        env:
          PRIM_DOWNLOAD_URL: "http://localhost:9877"
        run: |
          & ([scriptblock]::Create((Get-Content site/install.ps1 -Raw)))
          if (!(Test-Path "$env:USERPROFILE\.prim\bin\prim.exe")) {
            Write-Error "prim.exe not found after install"
            exit 1
          }
          $v = & "$env:USERPROFILE\.prim\bin\prim.exe" --version 2>$null
          Write-Host "Installed version: $v"
          if (!$v) {
            Write-Error "prim.exe --version returned nothing"
            exit 1
          }

      - name: Test install with invite code argument
        shell: pwsh
        env:
          PRIM_DOWNLOAD_URL: "http://localhost:9877"
        run: |
          # Remove existing install to test fresh
          Remove-Item -Recurse -Force "$env:USERPROFILE\.prim" -ErrorAction SilentlyContinue
          # Run with invite code — onboard will fail (no server) but script should get that far
          try {
            & ([scriptblock]::Create((Get-Content site/install.ps1 -Raw))) PRIM-TEST1234
          } catch {
            # Expected: onboard command fails since there's no real gate server
            Write-Host "Onboard failed as expected (no gate server): $_"
          }
          # Binary should still be installed
          if (!(Test-Path "$env:USERPROFILE\.prim\bin\prim.exe")) {
            Write-Error "prim.exe not found after install with invite code"
            exit 1
          }
          Write-Host "Install with invite code: binary placed correctly"

      - name: Verify PATH update
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          if ($userPath -notlike "*\.prim\bin*") {
            Write-Error "PATH not updated with .prim\bin"
            exit 1
          }
          Write-Host "PATH correctly includes .prim\bin"
