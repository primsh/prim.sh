name: E2E Local

on:
  workflow_dispatch: # Manual trigger only for now
  # Future: trigger on PR merge to main
  # push:
  #   branches: [main]

concurrency:
  group: e2e-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-store:
    name: store.sh E2E (testnet)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build x402-middleware
        run: pnpm --filter @primsh/x402-middleware build

      - name: Run store.sh e2e-local
        env:
          PRIM_NETWORK: eip155:84532
          REVENUE_WALLET: ${{ secrets.REVENUE_WALLET }}
          AGENT_PRIVATE_KEY: ${{ secrets.E2E_WALLET_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bun run e2e/tests/store.test.ts
