# Dependabot auto-creates PRs for vulnerable dependencies
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Group minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
